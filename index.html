<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾军团十大工作原则</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-family: 'STKaiti', 'KaiTi', serif;
            color: #ffd700;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            letter-spacing: 8px;
            margin-bottom: 12px;
        }
        
        .header .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            letter-spacing: 4px;
        }
        
        .image-container {
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .footer {
            margin-top: 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }
        
        .footer .team {
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 28px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>龙虾军团十大工作原则</h1>
        <div class="subtitle">🐴 大管家 · 团队精神</div>
    </div>
    
    <div class="image-container">
        <img src="principles-pyramid.jpg?v=2" alt="龙虾军团十大工作原则金字塔">
    </div>
    
    <div class="footer">
        <div class="team">🦞 龙虾军团</div>
        <div>实事求是 · 知行合一</div>
    </div>
</body>
</html>
